apiVersion: v1
kind: ServiceAccount
metadata:
  name: cursor-agent
  namespace: leantime
  labels:
    app: cursor-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cursor-agent-observer
  namespace: leantime
  labels:
    app: cursor-agent
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments", "replicasets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cursor-agent-observer
  namespace: leantime
  labels:
    app: cursor-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cursor-agent-observer
subjects:
  - kind: ServiceAccount
    name: cursor-agent
    namespace: leantime
