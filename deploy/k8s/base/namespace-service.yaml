apiVersion: v1
kind: Namespace
metadata:
  name: leantime
---
apiVersion: v1
kind: Service
metadata:
  name: cursor-agents
  namespace: leantime
  labels:
    app: cursor-agent
spec:
  clusterIP: None
  selector:
    app: cursor-agent
  ports:
    - name: http
      port: 8080
      targetPort: 8080
